<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Konfirmasi Jumlah Orang</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      background:#f5f5f5;
    }

    .container{
      width: 85%;
      margin: 30px auto;
      background: linear-gradient(to bottom,#d96d2b,#e8942d);
      padding: 20px;
      min-height: 100vh;
    }

    /* Navbar */
    .navbar{
      background: #f2b233;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:15px 25px;
    }

    .logo{
      display:flex;
      align-items:center;
      gap:10px;
      font-weight:bold;
      color:#333;
    }

    .logo img{
      width:45px;
      height:45px;
      border-radius:50%;
    }

    .menu a{
      text-decoration:none;
      color:#333;
      margin-left:20px;
      font-weight:bold;
    }

    .menu a:hover{
      color:white;
    }

    /* Card */
    .card{
      width:80%;
      margin:80px auto;
      background:#f0a72e;
      padding:50px;
      text-align:center;
    }

    .card h1{
      color:white;
      margin-bottom:40px;
      font-size:40px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      background:white;
    }

    th{
      background:#f7f7f7;
      padding:15px;
      border:1px solid #ddd;
    }

    td{
      padding:20px;
      border-bottom:1px solid #ddd;
    }

    .btn{
      margin-top:25px;
      padding:12px 35px;
      border:none;
      border-radius:20px;
      background:#df8657;
      color:white;
      font-weight:bold;
      cursor:pointer;
    }

    .btn:hover{
      background:#c96f42;
    }

    /* Footer */
    footer{
      background:#555;
      color:white;
      text-align:center;
      padding:20px;
      margin-top:40px;
    }

  </style>
</head>
<body>

  <div class="container">

    <!-- Navbar -->
    <div class="navbar">
      <div class="logo">
        <img src="assets/wisata/logo.jpg" alt="Logo">
        <span>HALLO USER SELAMAT DATANG</span>
      </div>

      <div class="menu">
        <a href="user.html">RIWAYAT PERJALANAN</a>
        <a href="#">PROFIL</a>
        <a href="index.html" onclick="logout()">LOGOUT</a>
      </div>
    </div>

    <!-- Isi -->
    <div class="card">
      <h1>Konfirmasi Jumlah Orang</h1>

      <table>
        <thead>
          <tr>
            <th>No</th>
            <th>Nama</th>
            <th>Paket Wisata</th>
            <th>Tanggal</th>
            <th>Jumlah Orang</th>
          </tr>
        </thead>

        <tbody id="dataTable">
          <!-- Data dari JavaScript -->
        </tbody>
      </table>

      <button class="btn" onclick="selesai()">
        Selesai
      </button>
    </div>

    <!-- Footer -->
    <footer>
      <p>© Jasa Wisata - Zahran Hafizh</p>
      <p>SMK Dinamika Pembangunan 2 Jakarta</p>
    </footer>

  </div>

  <script>
    // Data perjalanan
    const data = [
      {
        nama: "Andi",
        paket: "Paket Bali",
        tanggal: "10 Mei 2026",
        jumlah: 2
      },
      {
        nama: "Budi",
        paket: "Paket Bandung",
        tanggal: "15 Mei 2026",
        jumlah: 4
      }
    ];

    // Menampilkan data ke tabel
    const table = document.getElementById("dataTable");

    data.forEach((item, index) => {
      table.innerHTML += `
        <tr>
          <td>${index + 1}</td>
          <td>${item.nama}</td>
          <td>${item.paket}</td>
          <td>${item.tanggal}</td>
          <td>${item.jumlah}</td>
        </tr>
      `;
    });

    // Tombol selesai
    function selesai(){
      alert("Data berhasil dikonfirmasi!");
    }

    // Logout
    function logout(){
      alert("Anda berhasil logout!");
    }
  </script>

</body>
</html>
